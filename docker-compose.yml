# ============================================================
# Self-Healing RAG Platform — Docker Compose
# ============================================================
# Usage:
#   1. Copy backend/.env.example → backend/.env and fill values
#   2. Run: docker-compose up --build
# ============================================================

version: '3.9'

services:
  # ---- Backend (FastAPI) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: selfheal-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override Ollama host to reach host machine
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./backend/app:/app/app   # Hot reload in development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ---- Frontend (React + nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: selfheal-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: selfheal-network
